<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xtation</title>
    <meta name="theme-color" content="#0e1014" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            user-select: none;
        }

        /* Utilities (theme mapped) */
        .text-kpr-red { color: var(--app-accent); }
        .bg-kpr-red { background-color: var(--app-accent); }
        .border-kpr-red { border-color: var(--app-accent); }
        
        .font-mono { font-family: 'Space Mono', monospace; }
        
        /* Shape Clipping - 45 degree cut corners */
        .clip-cut-corner {
            clip-path: polygon(
                0 0, 
                100% 0, 
                100% calc(100% - 12px), 
                calc(100% - 12px) 100%, 
                0 100%
            );
        }
        
        .clip-cut-corner-top-right {
             clip-path: polygon(
                0 0, 
                calc(100% - 12px) 0, 
                100% 12px, 
                100% 100%, 
                0 100%
            );
        }

        /* Animations */
        @keyframes spin-linear {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-linear 10s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .animate-scanline {
            animation: scanline 4s linear infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .animate-blink {
            animation: blink 1s step-end infinite;
        }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.2s ease-out forwards;
        }

        @keyframes match-found-fade {
            0% { opacity: 0; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-match-found-fade {
            animation: match-found-fade 0.6s ease-out forwards;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--app-accent) 35%, transparent); opacity: 1; }
            70% { box-shadow: 0 0 0 22px color-mix(in srgb, var(--app-accent) 0%, transparent); opacity: 0; }
            100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--app-accent) 0%, transparent); opacity: 0; }
        }
        .animate-pulse-border {
            animation: pulse-border 2s ease-out infinite;
        }

        /* Glitch Effect utility */
        .glitch-hover:hover {
            animation: blink 0.1s cubic-bezier(0.4, 0, 0.6, 1) 2;
        }

        /* KPR Text Glitch Animation */
        @keyframes glitch-text {
            0% { transform: translate(0); text-shadow: none; }
            20% { transform: translate(-1px, 1px); text-shadow: 2px 0 var(--app-accent), -2px 0 color-mix(in srgb, var(--app-text) 70%, var(--app-accent)); }
            40% { transform: translate(1px, -1px); text-shadow: -2px 0 var(--app-accent), 2px 0 color-mix(in srgb, var(--app-text) 70%, var(--app-accent)); }
            60% { transform: translate(-1px, -1px); text-shadow: 2px 0 var(--app-accent), -2px 0 color-mix(in srgb, var(--app-text) 70%, var(--app-accent)); }
            80% { transform: translate(1px, 1px); text-shadow: -2px 0 var(--app-accent), 2px 0 color-mix(in srgb, var(--app-text) 70%, var(--app-accent)); }
            100% { transform: translate(0); text-shadow: none; }
        }
        
        .hover-text-glitch:hover {
            display: inline-block;
            animation: glitch-text 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            color: var(--app-text);
        }

        @keyframes text-glow-pulse {
            0%, 100% { text-shadow: 0 0 2px color-mix(in srgb, var(--app-accent) 20%, transparent); }
            50% { text-shadow: 0 0 10px color-mix(in srgb, var(--app-accent) 80%, transparent), 0 0 2px color-mix(in srgb, var(--app-text) 50%, transparent); }
        }
        
        .animate-text-glow {
            animation: text-glow-pulse 3s infinite;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
